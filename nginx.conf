# ============================================================
# Nginx Configuration for React Single-Page Application (SPA)
# ============================================================
# WHY do we need this?
#
# React Router handles navigation on the CLIENT side (in the browser).
# But Nginx is a SERVER - when someone visits zyratech.com/about,
# Nginx looks for a FILE called "about" on disk. That file doesn't exist!
# React builds everything into a single index.html file.
#
# The "try_files" directive below tells Nginx:
#   1. First, try to serve the exact file requested ($uri)
#   2. Then, try it as a directory ($uri/)
#   3. If nothing is found, serve index.html and let React Router handle it
# ============================================================

server {
    listen 80;
    server_name _;

    # Where your built React files live
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This is the magic line that makes React Router work!
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets (JS, CSS, images) for better performance
    # These files have unique hashes in their names from Vite, so caching is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Optional: Disable logging for favicon requests (reduces noise in logs)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
